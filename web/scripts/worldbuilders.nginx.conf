# Worldbuilders web companion — nginx vhost snippet (Q325 deliverable #8).
#
# Alternative to the Caddy snippet next to this file. Operator picks one and
# installs into /etc/nginx/sites-available/. Agent does NOT touch /etc/*.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name worldbuilders.quicktoolry.com;

    # TLS managed by the operator (Cloudflare origin cert recommended).
    # ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    # ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    root /home/deploy/projects/worldbuilders/web-deploy/current;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
        add_header Cache-Control "public, max-age=60, must-revalidate";
    }

    access_log /var/log/nginx/worldbuilders.access.log;
    error_log  /var/log/nginx/worldbuilders.error.log;
}

server {
    listen 80;
    listen [::]:80;
    server_name worldbuilders.quicktoolry.com www.worldbuilders.quicktoolry.com;
    return 301 https://worldbuilders.quicktoolry.com$request_uri;
}
