name: web-ci

on:
  push:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: web

jobs:
  build-test-lighthouse:
    name: build + playwright + lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci || npm install

      - name: Astro build
        run: npm run build
        env:
          WB_SITE_URL: https://worldbuilders.quicktoolry.com

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e (homepage smoke + a11y)
        run: npm run test:e2e

      - name: Lighthouse CI (perf + a11y >= 90; per Q520)
        run: npx --yes @lhci/cli@0.14.0 autorun --config=./lighthouserc.json
        continue-on-error: false

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          if-no-files-found: ignore
